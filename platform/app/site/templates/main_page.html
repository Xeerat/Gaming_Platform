<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Главная страница</title>
  <link rel="stylesheet" href="\static\style_mainPage.css">
</head>
<body>

  {% if success %}
  <div class="notification success">
    <button class="close-btn" onclick="this.parentElement.remove()">×</button>
    {{ success }}
  </div>
  {% endif %}

  {% if error %}
  <div class="notification error">
    <button class="close-btn" onclick="this.parentElement.remove()">×</button>
    {{ error }}
  </div>
  {% endif %}

  <div class="content">
    <!-- Здесь будет основной контент страницы -->
  </div>

  <div class="sidebar">
    <form id="deleteForm" action="/auth/del/" method="post"></form>
    <button type="button" onclick="confirmDelete()">Удалить аккаунт</button>
    
    <form id="constructor" action="/main/constructor" method="get"></form>
    <button type="button" onclick="confirmConstructor()">Конструктор</button>

    <button>Настройки</button>
    <button onclick="confirmLogout()" class="logout-btn">Выход из аккаунта</button>
  </div>

<script>
function confirmLogout() {
    if (confirm("Вы уверены, что хотите выйти?")) {
        window.location.href = "/auth/logout/";
    }
}

function confirmDelete() {
    if (confirm("Вы уверены, что хотите удалить пользователя?")) {
        document.getElementById('deleteForm').submit();
    }
}

function confirmConstructor() {
    if (confirm("Вы желаете перейти в конструктор?")) {
        document.getElementById('constructor').submit();
    }
}
</script>

</body>
</html>
