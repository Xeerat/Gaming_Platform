<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>VN Constructor</title>
  <link rel="stylesheet" href="/static/style_constructor.css">
</head>

<body>

<!-- ЛЕВАЯ ПАНЕЛЬ -->
<div id="assets">
    <h3>Спрайты</h3>
    <input type="file" id="spriteLoader" accept="image/*">
    <button onclick="addSprite()">Добавить спрайт</button>

    <hr>
    <h3>Фон</h3>
    <input type="file" id="bgLoader" accept="image/*">
    <button onclick="setBackground()">Добавить фон</button>

    <hr>
    <h3>Музыка</h3>
    <input type="file" id="audioLoader" accept="audio/*">
    <button onclick="addAudio()">Добавить аудио</button>

    <button onclick="document.getElementById('previewLoader').click()">🖼️ Загрузить превью</button>
    <input type="file" id="previewLoader" accept="image/*" style="display:none">

</div>

<!-- СЦЕНА -->
<div id="scene"></div>

<div id="dialogBox">
    <div id="name"></div>
    <div id="text"></div>
</div>

<!-- ПРАВАЯ ПАНЕЛЬ -->
<div id="panel">
    <h3>Параметры</h3>
    <div>X <input id="x"></div>
    <div>Y <input id="y"></div>
    <div>Scale <input id="scale" type="range" min="0.1" max="2" step="0.1"></div>
    <button onclick="deleteSprite()">Удалить спрайт</button>
    <button onclick="openLogic()">Логика</button>

    <hr>

    <h3>Название проекта</h3>
<input type="text" id="novelTitle" placeholder="Название новеллы" value="Моя новелла">

    <h3>Диалог</h3>
    <div>Имя <input id="charName"></div>
    <div>Текст <input id="dialogText"></div>
    <button onclick="addReplicaBlock()">+ Добавить реплику</button>

    <br>
    
    <button onclick="playDialog()">▶ Играть</button>
    <button onclick="saveProject()">💾 Сохранить</button>
    <button onclick="stopAudio()">■ Остановить музыку</button>
    <button onclick="confirmLogout()">Выход</button>
</div>

<!-- ЛОГИКА -->
<div id="logic">
    <canvas id="logicCanvas"></canvas>
    <button id="closeLogicBtn" style="position:absolute;top:10px;right:10px;z-index:10;padding:5px 10px;">Выйти</button>
</div>

<div id="robotAssistant">
    <div class="robot-head">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
        <div class="mouth"></div>
    </div>

    <div class="robot-body"></div>
    <div id="robotBubble">Привет! Я могу помочь 🎨</div>

    <div class="robot-menu">
        <button onclick="robotAction('character')">🎭</button>
        <button onclick="robotAction('background')">🌄</button>
        <button onclick="robotAction('remove_bg')">✂️</button>
    </div>
</div>

<script>
function confirmLogout() {
    if (confirm("Вы уверены, что хотите выйти?")) {
        window.location.href = "/main/";
    }
}</script>

<script src="/static/functions/constructor.js"></script>

</body>
</html>
