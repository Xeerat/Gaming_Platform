<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Редактор карты с отступами</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f0f0f0;
}
#container {
    display: flex;
    align-items: flex-start;
    padding: 10px;
    gap: 20px;
}
#controls {
    width: 200px;
}
#controls h3 {
    margin-bottom: 10px;
}
#canvasWrapper {
    flex: 1;
}
canvas {
    display: block;
    border: 1px solid #000;
    background: #fff;
}
.tile-size {
    margin: 0; /* сетка отступов можно регулировать здесь */
}
button {
    padding: 6px 12px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #333;
    background: #eee;
    cursor: pointer;
    transition: 0.2s;
    display: block;
    margin-bottom: 5px;
}
button:hover {
    background: #ddd;
}
</style>
</head>
<body>

<div id="container">
    <div id="controls">
        <h3>Управление</h3>
        <label>Выбор цвета:</label>
        <input type="color" id="colorPicker" value="#ff0000">
        <button id="saveBtn">Сохранить карту</button>
    </div>
    <div id="canvasWrapper">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<script src="map_editor.js"></script>
</body>
</html>
