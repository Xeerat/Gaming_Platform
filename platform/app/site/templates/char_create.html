<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Редактор карты и персонажей</title>
<style>
body {
    margin:0;
    font-family: sans-serif;
    background:#f0f0f0;
}
#container {
    display:flex;
    align-items:flex-start;
    padding:10px;
    gap: 20px; /* расстояние между колонками */
}

/* Левая колонка — палитра и кнопки */
#controls {
    width: 200px;
}

/* Палитра */
#palette {
    display:flex;
    flex-wrap: wrap;
    width: 160px; /* 5 цветов в строке */
    margin-bottom:10px;
    gap: 4px; /* отступ между цветами */
}
.tile {
    width:32px;
    height:32px;
    border:1px solid #555;
    cursor:pointer;
    transition: transform 0.1s;
}
.tile:hover { transform: scale(1.1); }
.selected { border:3px solid red; }

/* Кнопки */
button {
    padding:6px 12px;
    font-size:16px;
    border-radius:5px;
    border:1px solid #333;
    background:#eee;
    cursor:pointer;
    transition: all 0.2s;
    display:block;
    margin-bottom:5px;
}
button:hover { background:#ddd; }

/* Canvas */
#canvasWrapper canvas {
    display:block;
    border:1px solid #000;
}
</style>
</head>
<body>

<div id="container">
    <div id="controls">
        <h3>Палитра</h3>
        <div id="palette"></div>
        <button id="saveMapBtn">Сохранить карту</button>
        <button id="saveCharBtn">Сохранить персонажа</button>
    </div>
    <div id="canvasWrapper">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<script src="char.js"></script>
</body>
</html>
