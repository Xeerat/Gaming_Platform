<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Забыли пароль?</title>
  <link rel="stylesheet" href="/static/style_forgot_password1.css">
</head>
<body>

<div class="login-container">
    <h2>Восстановление пароля</h2>

    <div id="messageBox" class="message hidden"></div>

    <form action="/send-reset-email" method="POST" id="resetForm">
        <div class="form-group floating">
            <input type="email" id="email" name="email" required>
            <label for="email">Email</label>
        </div>
        <button type="submit" class="btn">Отправить</button>
    </form>
</div>

<script>
    // Переменная TOKEN
    // Если токен присутствует, мы сразу перенаправляем на вторую страницу
    const token = null; 

    // Переменная SUCCESS
    // true или false (или 1/0)
    const success = false; 

    // Переменная ERROR
    // Текст ошибки или null
    const error = null; 

    document.addEventListener('DOMContentLoaded', () => {
        const messageBox = document.getElementById('messageBox');

        // Обработка Токена
        if (token) {
            console.log("Токен найден. Редирект на вторую страницу...");
            // Перенаправление на GET функцию второй страницы с передачей токена
            window.location.href = `/reset-password-page?token=${token}`;
            return; // Останавливаем выполнение скрипта
        }

        // Обработка Успеха
        if (success) {
            messageBox.textContent = "Инструкция по сбросу пароля отправлена на вашу почту!";
            messageBox.className = "message success";
            messageBox.classList.remove('hidden');
        }

        // Обработка Ошибки
        if (error) {
            messageBox.textContent = error;
            messageBox.className = "message error";
            messageBox.classList.remove('hidden');
        }
    });
</script>

</body>
</html>
