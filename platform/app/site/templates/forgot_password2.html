<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <link rel="stylesheet" href="/static/style_forgot_password2.css">
</head>

<body>

<div class="reset-container">
    <h2>Создание нового пароля</h2>

    <div id="messageBox" class="message"></div>

    <form action="/reset-password" method="POST">
        
        <input type="hidden" name="token" value="">

        <div class="form-group">
            <input type="password" id="password" name="password" required>
            <label for="password">Новый пароль</label>
        </div>

        <div class="form-group">
            <input type="password" id="confirm_password" name="confirm_password" required>
            <label for="confirm_password">Повторите пароль</label>
        </div>

        <button type="submit" class="btn">Отправить</button>
    </form>
</div>

<script>
    // Переменная error (передаётся сервером)
    const error = null; // сюда сервер может подставлять текст ошибки

    document.addEventListener('DOMContentLoaded', () => {
        const messageBox = document.getElementById('messageBox');

        if (error) {
            messageBox.textContent = error;
            messageBox.classList.add('error');
        }
    });
</script>

<script src="/static/functions/eye.js"></script>

</body>
</html>
